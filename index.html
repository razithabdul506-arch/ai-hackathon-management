<!DOCTYPE html>
<html>
<head>
<title>AI Hackathon Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen text-white">

<div class="max-w-5xl mx-auto py-16">

<h1 class="text-5xl font-bold text-center mb-6">
AI Hackathon Platform
</h1>

<h2 class="text-center text-xl mb-10">
Submission closes in: <span id="timer"></span>
</h2>

<div class="grid md:grid-cols-3 gap-6">

<a href="submit.html"
class="bg-white text-gray-800 p-6 rounded-xl shadow text-center">
Submit Project
</a>

<a href="leaderboard.html"
class="bg-white text-gray-800 p-6 rounded-xl shadow text-center">
Leaderboard
</a>

<a href="admin-login.html"
class="bg-white text-gray-800 p-6 rounded-xl shadow text-center">
Admin
</a>

</div>

</div>

<script>

const deadline = new Date("2026-04-01T18:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();

const distance = deadline - now;

const h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((distance%(1000*60*60))/(1000*60));
const s = Math.floor((distance%(1000*60))/1000);

document.getElementById("timer").innerHTML = h+"h "+m+"m "+s+"s";

if(distance < 0){

document.getElementById("timer").innerHTML="SUBMISSION CLOSED";

}

},1000)

</script>

</body>
</html>
